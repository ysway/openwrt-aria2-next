name: Build aria2-next

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: 'OpenWrt SDK version (e.g. 24.10.4)'
        required: false
        default: '24.10.4'
  repository_dispatch:
    types: [build-aria2-next]

permissions:
  contents: read

env:
  SOFTWARE_NAME: "aria2-next"
  REPO_OWNER: "ysway"
  REPO_NAME: "openwrt-aria2-next"
  ARTIFACT_DIR: "artifacts"
  OPENWRT_IPK_SDK: "24.10.4"
  OPENWRT_APK_SDK: "25.12.0"
  # Platforms not available in 24.10 SDK (build with 25.12 instead)
  ONLY_25: "riscv64_generic"
  # Platforms removed in 25.12 SDK (24.10 only)
  SKIP_25: "mips_4kec riscv64_riscv64"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      date: ${{ steps.get_date.outputs.date }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_cortex-a76
          - aarch64_generic
          - arm_arm1176jzf-s_vfp
          - arm_arm926ej-s
          - arm_cortex-a15_neon-vfpv4
          - arm_cortex-a5_vfpv4
          - arm_cortex-a7
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a7_vfpv4
          - arm_cortex-a8_vfpv3
          - arm_cortex-a9
          - arm_cortex-a9_neon
          - arm_cortex-a9_vfpv3-d16
          - arm_fa526
          - arm_xscale
          - i386_pentium-mmx
          - i386_pentium4
          - loongarch64_generic
          - mips64_mips64r2
          - mips64_octeonplus
          - mips64el_mips64r2
          - mips_24kc
          - mips_4kec
          - mips_mips32
          - mipsel_24kc
          - mipsel_24kc_24kf
          - mipsel_74kc
          - mipsel_mips32
          - riscv64_riscv64
          - x86_64
          - riscv64_generic  # 25.12 only

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          submodules: true
          path: repo

      - name: Get aria2-next Version
        id: get_version
        run: |
          VERSION=$(sed -n 's/^[[:space:]]*VERSION[[:space:]]\+\([0-9][0-9.]*\).*/\1/p' \
            repo/aria2-next/CMakeLists.txt | head -1)
          echo "version=${VERSION:-unknown}" >> "$GITHUB_OUTPUT"
          echo "Detected aria2-next version: $VERSION"

      - name: Set Build Timestamp
        id: get_date
        run: |
          echo "date=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

      - name: Prepare Directories
        run: |
          mkdir -p output "${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}"
          chmod -R 777 output || true

      - name: Determine SDK version
        id: sdk
        run: |
          PLATFORM="${{ matrix.platform }}"
          if echo "${{ env.ONLY_25 }}" | grep -qw "$PLATFORM"; then
            echo "version=${{ env.OPENWRT_APK_SDK }}" >> "$GITHUB_OUTPUT"
            echo "Using 25.12 SDK (platform only available in 25.12)"
          else
            echo "version=${{ inputs.sdk_version || env.OPENWRT_IPK_SDK }}" >> "$GITHUB_OUTPUT"
            echo "Using ${{ inputs.sdk_version || env.OPENWRT_IPK_SDK }} SDK"
          fi

      - name: Pull OpenWrt SDK Docker Image
        run: |
          SDK_TAG="${{ matrix.platform }}-V${{ steps.sdk.outputs.version }}"
          echo "Pulling ghcr.io/openwrt/sdk:${SDK_TAG}"
          docker pull "ghcr.io/openwrt/sdk:${SDK_TAG}"

      - name: Build aria2-next in SDK Container
        run: |
          docker run --rm --user root \
            -v "$(pwd)/repo:/work/repo:z" \
            -v "$(pwd)/output:/work/output:z" \
            -e PLATFORM="${{ matrix.platform }}" \
            -e OPENWRT_SDK_VERSION="${{ steps.sdk.outputs.version }}" \
            -e BUILD_VERSION="${GITHUB_SHA:0:8}" \
            -e TERM=xterm \
            "ghcr.io/openwrt/sdk:${{ matrix.platform }}-V${{ steps.sdk.outputs.version }}" \
            bash /work/repo/build_scripts/build_in_sdk.sh "${{ matrix.platform }}"

      - name: Collect Artifacts
        run: |
          PLATFORM="${{ matrix.platform }}"
          DEST="${{ env.ARTIFACT_DIR }}/${PLATFORM}"
          if [ -d "output/${PLATFORM}" ]; then
            cp -r "output/${PLATFORM}"/* "${DEST}/"
            echo "Artifacts collected for ${PLATFORM}:"
            ls -la "${DEST}/"
          else
            echo "ERROR: No output directory found for ${PLATFORM}"
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: aria2-next-static-${{ matrix.platform }}
          path: ${{ env.ARTIFACT_DIR }}/${{ matrix.platform }}/
          if-no-files-found: error
          retention-days: 30

  deploy:
    name: Deploy Feed
    needs: [build]
    runs-on: ubuntu-slim
    permissions:
      contents: write
    env:
      RELEASE_TAG: v${{ needs.build.outputs.version }}
      RELEASE_VERSION: ${{ needs.build.outputs.version }}
      BUILD_DATE: ${{ needs.build.outputs.date }}
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ env.ARTIFACT_DIR }}

      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          path: repo

      - name: Deploy to Feed Branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          mkdir deploy_workspace && cd deploy_workspace
          git init
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git checkout --orphan feed

          # Copy feed template
          cp -r ../repo/feed_template/* ./
          touch .nojekyll

          # Copy artifacts (strip aria2-next-static- prefix for clean directory names)
          for dir in ../${{ env.ARTIFACT_DIR }}/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            platform="${name#aria2-next-static-}"
            mkdir -p "$platform"
            cp -r "$dir"/* "$platform/" 2>/dev/null || true
          done

          # Generate Packages index per platform
          for plat_dir in */; do
            [ -d "$plat_dir" ] || continue
            platform="${plat_dir%/}"
            [ -f "$platform"/*.ipk ] 2>/dev/null || continue
            cd "$platform"
            for ipk in *.ipk; do
              [ -f "$ipk" ] || continue
              SIZE=$(stat -c%s "$ipk")
              MD5=$(md5sum "$ipk" | awk '{print $1}')
              SHA256=$(sha256sum "$ipk" | awk '{print $1}')
              # Extract control info
              CONTROL_FILE=$(mktemp)
              if tar -xOf "$ipk" ./control.tar.gz 2>/dev/null \
                | tar -xzOf - ./control 2>/dev/null > "$CONTROL_FILE"; then
                cat "$CONTROL_FILE" >> Packages
              fi
              rm -f "$CONTROL_FILE"
              printf "Filename: %s\nSize: %s\nMD5Sum: %s\nSHA256sum: %s\n\n" \
                "$ipk" "$SIZE" "$MD5" "$SHA256" >> Packages
            done
            gzip -k Packages 2>/dev/null || gzip -c Packages > Packages.gz
            cd ..
          done

          # Generate HTML sections for each architecture and insert into index.html
          generate_arch_sections() {
            for arch_dir in */; do
              [ -d "$arch_dir" ] || continue
              arch="${arch_dir%/}"

              echo "<details class=\"arch-section\">"
              echo "    <summary>$arch</summary>"
              echo "    <table>"
              echo "        <thead>"
              echo "            <tr><th>File</th><th>Size</th><th>Sha256Sum</th></tr>"
              echo "        </thead>"
              echo "        <tbody>"

              for file_path in "$arch"/*; do
                [ -f "$file_path" ] || continue

                file=$(basename "$file_path")

                case "$file" in
                  *.ipk|*.apk|aria2-next|BUILDINFO|Packages|Packages.gz|Packages.sig|packages.adb)
                    ;;
                  *)
                    continue
                    ;;
                esac

                fsize=$(du -h "$file_path" | cut -f1)
                fsha256=$(sha256sum "$file_path" | cut -d' ' -f1)

                echo "            <tr>"
                echo "                <td><a href=\"$arch/$file\">$file</a></td>"
                echo "                <td class=\"size-cell\">$fsize</td>"
                echo "                <td class=\"sha256-cell\">$fsha256</td>"
                echo "            </tr>"
              done

              echo "        </tbody>"
              echo "    </table>"
              echo "</details>"
            done
          }

          generate_arch_sections > tbody.tmp

          sed -i '/<!-- arch-section-anchor -->/,/<!-- end-arch-section-anchor -->/ {
            /<!-- arch-section-anchor -->/!{
              /<!-- end-arch-section-anchor -->/!d
            }
          }' index.html
          sed -i '/<!-- arch-section-anchor -->/r tbody.tmp' index.html

          current_date="${{ env.BUILD_DATE }}"
          sed -i '/<!-- date-anchor -->/,/<!-- end-date-anchor -->/ {
            /<strong id="date">/ {
              s#<strong id="date">.*</strong>#<strong id="date">'"${current_date}"'</strong>#
            }
          }' index.html

          version="${{ env.RELEASE_VERSION }}"
          sed -i '/<!-- version-anchor -->/,/<!-- end-version-anchor -->/ {
            /<strong id="version">/ {
              s#<strong id="version">.*</strong>#<strong id="version">'"${version}"'</strong>#
            }
          }' index.html

          rm -f tbody.tmp

          git add -A
          git commit -m "Update feed: ${{ env.BUILD_DATE }}"
          git push origin feed --force

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-slim
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.build.outputs.version }}
      BUILD_DATE: ${{ needs.build.outputs.date }}
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ env.ARTIFACT_DIR }}

      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          submodules: true
          path: repo

      - name: Determine Upstream Release Tag
        id: get_release_tag
        run: |
          set -euo pipefail

          git -C repo/aria2-next fetch --force --tags origin
          RELEASE_TAG=$(git -C repo/aria2-next describe --tags --exact-match HEAD 2>/dev/null || true)

          if [ -z "$RELEASE_TAG" ]; then
            RELEASE_TAG='${{ github.event.client_payload.tag }}'
          fi

          if [ -z "$RELEASE_TAG" ]; then
            SUBMODULE_SHA=$(git -C repo/aria2-next rev-parse --short=12 HEAD)
            RELEASE_TAG="aria2-next-${{ env.RELEASE_VERSION }}-${SUBMODULE_SHA}"
          fi

          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "Using upstream release tag: $RELEASE_TAG"

      - name: Prepare Release Files and Notes
        id: prepare_release
        env:
          RELEASE_TAG: ${{ steps.get_release_tag.outputs.tag }}
        run: |
          # Rename packages to include platform in filename for release
          for arch_dir in "${{ env.ARTIFACT_DIR }}"/*/; do
            [ -d "$arch_dir" ] || continue
            arch=$(basename "$arch_dir")
            platform="${arch#aria2-next-static-}"

            for ipk in "$arch_dir"/*.ipk; do
              [ -f "$ipk" ] || continue
              base=$(basename "$ipk")
              pkg_name="${base%%_*}"
              new_name="${pkg_name}_${{ env.RELEASE_VERSION }}_${platform}.ipk"
              mv "$ipk" "$arch_dir/$new_name" 2>/dev/null || true
            done
          done

          # Rename APK packages too
          for arch_dir in "${{ env.ARTIFACT_DIR }}"/*/; do
            [ -d "$arch_dir" ] || continue
            arch=$(basename "$arch_dir")
            platform="${arch#aria2-next-static-}"

            for apk in "$arch_dir"/*.apk; do
              [ -f "$apk" ] || continue
              new_name="aria2-next-static_${{ env.RELEASE_VERSION }}_${platform}.apk"
              mv "$apk" "$arch_dir/$new_name" 2>/dev/null || true
            done
          done

          # Rename raw binaries too, otherwise every upload collides on the same aria2-next asset name.
          for arch_dir in "${{ env.ARTIFACT_DIR }}"/*/; do
            [ -d "$arch_dir" ] || continue
            arch=$(basename "$arch_dir")
            platform="${arch#aria2-next-static-}"

            if [ -f "$arch_dir/aria2-next" ]; then
              mv "$arch_dir/aria2-next" "$arch_dir/aria2-next_${{ env.RELEASE_VERSION }}_${platform}" 2>/dev/null || true
            fi
          done

          # Build release table
          table="| Target Platform | IPK Package (OpenWrt ≤24.10) | APK Package (OpenWrt ≥25.12) | Raw Binary |\n|:--- |:--- |:--- |:--- |"
          rows=""

          for arch_dir in "${{ env.ARTIFACT_DIR }}"/*/; do
            [ -d "$arch_dir" ] || continue
            arch=$(basename "$arch_dir")
            platform="${arch#aria2-next-static-}"

            ipk_file=$(ls "$arch_dir"/*.ipk 2>/dev/null | head -1 | xargs -n1 basename 2>/dev/null || echo "none")
            apk_file=$(ls "$arch_dir"/*.apk 2>/dev/null | head -1 | xargs -n1 basename 2>/dev/null || echo "none")
            bin_file=$(ls "$arch_dir"/aria2-next_* 2>/dev/null | head -1 | xargs -n1 basename 2>/dev/null || echo "none")

            if [ "$ipk_file" != "none" ]; then
              ipk_link="[${ipk_file}](${{ github.server_url }}/${{ github.repository }}/releases/download/${RELEASE_TAG}/${ipk_file})"
            else
              ipk_link="N/A"
            fi

            if [ "$apk_file" != "none" ]; then
              apk_link="[${apk_file}](${{ github.server_url }}/${{ github.repository }}/releases/download/${RELEASE_TAG}/${apk_file})"
            else
              apk_link="N/A"
            fi

            if [ "$bin_file" != "none" ]; then
              bin_link="[${bin_file}](${{ github.server_url }}/${{ github.repository }}/releases/download/${RELEASE_TAG}/${bin_file})"
            else
              bin_link="N/A"
            fi

            rows="${rows}\n| ${platform} | ${ipk_link} | ${apk_link} | ${bin_link} |"
          done

          full_table="${table}${rows}"

          release_body="## Static aria2-next for OpenWrt
          #### Version: ${RELEASE_TAG}
          #### Build Date: ${{ env.BUILD_DATE }}
          ---

          Statically linked aria2-next build for OpenWrt using official SDK.
          - Compiled with official OpenWrt SDK.
          - UPX compression applied where supported.
          - Standard IPK, APK, and raw binary assets for direct installation.

          #### Architecture Check
          OpenWrt 24.10 or earlier:
          \`\`\`bash
          opkg print-architecture | awk 'NF==3 && \$3~/^[0-9]+\$/ {print \$2}' | tail -1
          \`\`\`
          OpenWrt 25.12 or later:
          \`\`\`bash
          cat /etc/apk/arch
          \`\`\`
          ---

          #### Download Links

          ${full_table}
          "

          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          echo -e "${release_body}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_release_tag.outputs.tag }}
          name: "aria2-next-static ${{ env.RELEASE_VERSION }} (OpenWrt)"
          body: ${{ steps.prepare_release.outputs.release_body }}
          files: |
            ${{ env.ARTIFACT_DIR }}/**/*.ipk
            ${{ env.ARTIFACT_DIR }}/**/*.apk
            ${{ env.ARTIFACT_DIR }}/**/aria2-next_*
