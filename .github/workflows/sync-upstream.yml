name: Sync Upstream

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Check for upstream aria2-next updates
    # Git-only automation job; no Docker or privileged build steps required.
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update submodule to latest upstream release tag
        id: update
        run: |
          set -euo pipefail
          OLD_SHA=$(git rev-parse --verify HEAD:aria2-next 2>/dev/null || git -C aria2-next rev-parse HEAD)
          OLD_REF=$(git -C aria2-next describe --tags --exact-match HEAD 2>/dev/null || echo "untagged-${OLD_SHA:0:12}")

          git -C aria2-next fetch --force --tags origin
          LATEST_TAG=$(git -C aria2-next tag --list 'v*' --sort=-version:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            echo "ERROR: Could not determine latest aria2-next release tag" >&2
            exit 1
          fi

          if ! git -C aria2-next rev-parse --verify "${LATEST_TAG}^{commit}" >/dev/null; then
            echo "ERROR: Could not resolve aria2-next tag: $LATEST_TAG" >&2
            exit 1
          fi

          git -C aria2-next checkout --detach "$LATEST_TAG"
          NEW_SHA=$(git -C aria2-next rev-parse HEAD)
          NEW_REF=$(git -C aria2-next describe --tags --exact-match HEAD 2>/dev/null || echo "$LATEST_TAG")

          git add aria2-next

          echo "old_sha=$OLD_SHA" >> "$GITHUB_OUTPUT"
          echo "old_tag=$OLD_REF" >> "$GITHUB_OUTPUT"
          echo "new_sha=$NEW_SHA" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_REF" >> "$GITHUB_OUTPUT"

          if git diff --cached --quiet -- aria2-next; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "aria2-next already pinned to latest upstream release tag: $NEW_REF"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "aria2-next updated: $OLD_REF ($OLD_SHA) -> $NEW_REF ($NEW_SHA)"
          fi

      - name: Sync dependency versions from upstream baseline
        if: steps.update.outputs.changed == 'true'
        run: |
          set -euo pipefail

          UPSTREAM_DEPS="aria2-next/packaging/dependencies.env"
          TARGET_FILE="build_scripts/versions.sh"

          if [ ! -f "$UPSTREAM_DEPS" ]; then
            echo "ERROR: Missing upstream dependency file: $UPSTREAM_DEPS" >&2
            exit 1
          fi

          # shellcheck source=/dev/null
          . "$UPSTREAM_DEPS"

          for version_var in ZLIB_VERSION ZLIB_ARCHIVE ZLIB_URL ZLIB_SHA256 LIBSSH2_VERSION LIBSSH2_ARCHIVE LIBSSH2_URL LIBSSH2_SHA256 CURL_VERSION CURL_ARCHIVE CURL_URL CURL_SHA256 BOOST_VERSION BOOST_VERSION_UNDERSCORE BOOST_ARCHIVE BOOST_URL BOOST_SHA256 SPDLOG_VERSION SPDLOG_ARCHIVE SPDLOG_URL SPDLOG_SHA256 LIBTORRENT_VERSION LIBTORRENT_ARCHIVE LIBTORRENT_URL LIBTORRENT_SHA256 OPENSSL_VERSION OPENSSL_SERIES OPENSSL_ARCHIVE OPENSSL_URL OPENSSL_SHA256; do
            if [ -z "$(eval "printf '%s' \"\${$version_var}\"")" ]; then
              echo "ERROR: Failed to extract $version_var from $UPSTREAM_DEPS" >&2
              exit 1
            fi
          done

          update_assignment() {
            local key="$1"
            local value="$2"
            sed -i "s|^${key}=.*|${key}=\"${value}\"|" "$TARGET_FILE"
          }

          update_assignment ZLIB_VERSION "$ZLIB_VERSION"
          update_assignment ZLIB_ARCHIVE "$ZLIB_ARCHIVE"
          update_assignment ZLIB_URL "$ZLIB_URL"
          update_assignment ZLIB_SHA256 "$ZLIB_SHA256"
          update_assignment LIBSSH2_VERSION "$LIBSSH2_VERSION"
          update_assignment LIBSSH2_ARCHIVE "$LIBSSH2_ARCHIVE"
          update_assignment LIBSSH2_URL "$LIBSSH2_URL"
          update_assignment LIBSSH2_SHA256 "$LIBSSH2_SHA256"
          update_assignment CURL_VERSION "$CURL_VERSION"
          update_assignment CURL_ARCHIVE "$CURL_ARCHIVE"
          update_assignment CURL_URL "$CURL_URL"
          update_assignment CURL_SHA256 "$CURL_SHA256"
          update_assignment BOOST_VERSION "$BOOST_VERSION"
          update_assignment BOOST_VERSION_UNDERSCORE "$BOOST_VERSION_UNDERSCORE"
          update_assignment BOOST_ARCHIVE "$BOOST_ARCHIVE"
          update_assignment BOOST_URL "$BOOST_URL"
          update_assignment BOOST_SHA256 "$BOOST_SHA256"
          update_assignment SPDLOG_VERSION "$SPDLOG_VERSION"
          update_assignment SPDLOG_ARCHIVE "$SPDLOG_ARCHIVE"
          update_assignment SPDLOG_URL "$SPDLOG_URL"
          update_assignment SPDLOG_SHA256 "$SPDLOG_SHA256"
          update_assignment LIBTORRENT_VERSION "$LIBTORRENT_VERSION"
          update_assignment LIBTORRENT_ARCHIVE "$LIBTORRENT_ARCHIVE"
          update_assignment LIBTORRENT_URL "$LIBTORRENT_URL"
          update_assignment LIBTORRENT_SHA256 "$LIBTORRENT_SHA256"
          update_assignment OPENSSL_VERSION "$OPENSSL_VERSION"
          update_assignment OPENSSL_SERIES "$OPENSSL_SERIES"
          update_assignment OPENSSL_ARCHIVE "$OPENSSL_ARCHIVE"
          update_assignment OPENSSL_URL "$OPENSSL_URL"
          update_assignment OPENSSL_SHA256 "$OPENSSL_SHA256"

          git add "$TARGET_FILE"
          echo "Synchronized $TARGET_FILE from upstream dependency baseline"

      - name: Commit updated gitlink
        if: steps.update.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update aria2-next submodule to ${{ steps.update.outputs.new_tag }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Trigger build workflow
        if: steps.update.outputs.changed == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            // Pushes created with GITHUB_TOKEN do not trigger other workflows,
            // so dispatch the build explicitly after updating the default branch.
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'build-aria2-next',
              client_payload: {
                tag: '${{ steps.update.outputs.new_tag }}',
                sha: '${{ steps.update.outputs.new_sha }}'
              }
            });
